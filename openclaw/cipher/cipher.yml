# FORGE Stack — Cipher Configuration (Template)
# API keys are loaded from environment variables set in .env
mcpServers:
  rlm:
    type: stdio
    command: $HOME/Projects/AI-POWERSETUP/rlm-workspace/venv/bin/python3
    args:
      - $HOME/Projects/AI-POWERSETUP/rlm-workspace/rlm_mcp_server.py
    env:
      OPENAI_API_KEY: $ZAI_API_KEY
      OPENAI_API_BASE: https://api.z.ai/api/coding/paas/v4
      RLM_BACKEND: litellm
      RLM_MODEL: openai/glm-4.7
      RLM_MAX_ITERATIONS: "10"

llm:
  provider: openai
  model: glm-4.7
  apiKey: $ZAI_API_KEY
  baseUrl: https://api.z.ai/api/coding/paas/v4
  maxIterations: 30
  extraHeaders:
    Accept-Language: en-US,en

# Persistent storage for Cipher memory
storage:
  type: sqlite
  path: $HOME/data/cipher-sessions.db

# Embedding configuration — Jina AI
embedding:
  type: jina
  model: jina-embeddings-v3
  apiKey: $JINA_API_KEY

# System prompt (GLM-4.7 optimized)
systemPrompt:
  enabled: true
  content: |
    Anda adalah asisten coding senior. Jawab selalu dalam Bahasa Indonesia.
    Prioritas: (1) Ikuti aturan ini, (2) Ikuti permintaan user, (3) Jika kurang info, ajukan maksimal 3 pertanyaan klarifikasi.
    Output WAJIB: (a) Plan singkat 3-7 langkah, (b) Implementasi, (c) Cara verifikasi.
    Jika diminta JSON, keluarkan JSON valid saja (tanpa teks lain).
